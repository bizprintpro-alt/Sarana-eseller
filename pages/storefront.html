<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Дэлгүүр — eseller.mn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/pages/storefront.css">
</head>
<body>

<nav>
  <a class="logo-wrap" href="../index.html" style="text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0">
    <svg width="28" height="26" viewBox="0 0 28 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,0 28,8 22,26 6,26 0,8" fill="#CC0000" opacity="0.12"/>
      <polygon points="14,2 26,9 21,24 7,24 2,9" fill="none" stroke="#CC0000" stroke-width="1.2"/>
      <polygon points="14,2 26,9 14,24 2,9" fill="none" stroke="#CC0000" stroke-width="0.8" opacity="0.5"/>
      <line x1="2" y1="9" x2="26" y2="9" stroke="#CC0000" stroke-width="0.8" opacity="0.5"/>
      <line x1="7" y1="24" x2="14" y2="9" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
      <line x1="21" y1="24" x2="14" y2="9" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
    </svg>
    <span style="font-size:20px;font-weight:900;color:#CC0000;letter-spacing:-0.5px;font-family:'eseller Script',serif">eseller</span>
  </a>
  <div class="sw">
    <span class="sw-ic">🔍</span>
    <input id="srch" type="text" placeholder="Бараа хайх..." oninput="onSearch(this.value)">
  </div>
  <div class="nav-r">
    <a class="nav-a" href="login.html" id="nav-user">Нэвтрэх</a>
    <button class="cart-btn" onclick="openCart()">
      🛒 Сагс
      <span class="cbadge" id="cbadge"></span>
    </button>
  </div>
</nav>

<div class="catbar">
  <div class="catbar-inner">
    <button class="cbt on" onclick="setcat(this,'')">🏠 Бүгд</button>
    <button class="cbt" onclick="setcat(this,'food')">🍔 Хоол</button>
    <button class="cbt" onclick="setcat(this,'fashion')">👗 Хувцас</button>
    <button class="cbt" onclick="setcat(this,'electronics')">📱 Электроник</button>
    <button class="cbt" onclick="setcat(this,'beauty')">💄 Гоо сайхан</button>
    <button class="cbt" onclick="setcat(this,'home')">🏡 Гэр</button>
    <button class="cbt" onclick="setcat(this,'sports')">⚽ Спорт</button>
    <button class="cbt" onclick="setcat(this,'other')">📦 Бусад</button>
  </div>
</div>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-left">
      <div class="hero-pill"><span class="hero-dot"></span>Шинэ бараанууд нэмэгдлээ</div>
      <h1>Монголын хамгийн<br><em>том дэлгүүр</em></h1>
      <p>Мянга мянган бараанаас хямдарч авах боломжтой.<br>Хурдан хүргэлт, аюулгүй QPay төлбөр.</p>
      <button class="hero-cta" onclick="scrollDown()">🛍️ Одоо үзэх</button>
    </div>
    <div class="hero-emojis">
      <div class="he">👟</div>
      <div class="he">📱</div>
      <div class="he">💄</div>
    </div>
  </div>

  <!-- MINI BANNERS -->
  <div class="minibans">
    <button class="mb mb1" onclick="jumpCat('fashion')">
      <div class="mb-ico">🔥</div>
      <div><div class="mb-title">Хямдралтай бараа</div><div class="mb-sub">50% хүртэл хямдарсан</div></div>
    </button>
    <button class="mb mb2" onclick="jumpCat('food')">
      <div class="mb-ico">🚀</div>
      <div><div class="mb-title">Хурдан хүргэлт</div><div class="mb-sub">30 минутад хүрнэ</div></div>
    </button>
    <button class="mb mb3" onclick="jumpCat('electronics')">
      <div class="mb-ico">✨</div>
      <div><div class="mb-title">Шинэ ирэлтүүд</div><div class="mb-sub">Долоо хоногийн шинэ бараа</div></div>
    </button>
  </div>

  <!-- SALE SECTION -->
  <div id="sale-sec">
    <div class="sh">
      <div class="sh-title">🔥 Хямдралтай бараа</div>
      <button class="sh-more" onclick="jumpCat('')">Бүгдийг харах →</button>
    </div>
    <div class="hscroll" id="grid-sale">
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
    </div>
  </div>

  <!-- ALL PRODUCTS -->
  <div id="all-sec">
    <div class="sh">
      <div class="sh-title">✨ Бүх бараа <span id="all-cnt" style="font-size:13px;color:var(--t3);font-weight:500"></span></div>
    </div>
    <div class="pgrid" id="grid-all">
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
      <div class="sk"><div class="sk-img"></div><div class="sk-b"><div class="sk-l w8"></div><div class="sk-l w6"></div></div></div>
    </div>
  </div>

</div><!-- /page -->

<!-- CART DRAWER -->
<div class="dbg" id="dbg" onclick="closeCart()"></div>
<div class="cart-panel" id="cpanel">
  <div class="cp-top">
    <h3>🛒 Сагс <span id="cp-cnt" style="color:var(--t3);font-size:13px;font-weight:500"></span></h3>
    <button class="cp-x" onclick="closeCart()">✕</button>
  </div>
  <div class="cp-body" id="cp-body"></div>
  <div class="cp-foot">
    <div class="cp-row"><span>Барааны дүн</span><span id="cp-sub">₮0</span></div>
    <div class="cp-row"><span>Хүргэлт</span><span id="cp-del" style="color:var(--g)">₮3,000</span></div>
    <div class="cp-total"><span>Нийт дүн</span><span id="cp-tot">₮0</span></div>
    <button class="go-btn" id="go-btn" onclick="gocheckout()">💳 Захиалах</button>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="mdbg" id="mdbg" onclick="if(event.target===this)closePM()">
  <div class="pmodal" id="pm-inner"></div>
</div>
<script src="../js/api.js"></script>
<script src="../js/main.js"></script>
<script src="../js/pages/storefront.js"></script>
</body>
</html>
