
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-xl);border:0.5px solid var(--color-border-tertiary);overflow:hidden;font-family:var(--font-sans,sans-serif)}

/* ── Top nav ── */
.top-nav{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.back-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-secondary);border:none;background:none}
.back-btn:hover{background:var(--color-background-secondary)}
.store-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.store-info{flex:1;min-width:0}
.store-name{font-size:14px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:5px}
.verified{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#3B82F6;flex-shrink:0}
.online-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-tertiary)}
.odot{width:7px;height:7px;border-radius:50%;background:#22C55E}
.nav-actions{display:flex;gap:4px}
.nav-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-secondary);border:none;background:none;transition:background .12s}
.nav-btn:hover{background:var(--color-background-secondary)}

/* ── Order banner ── */
.order-banner{margin:10px 14px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.ob-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.ob-label{font-size:11px;color:var(--color-text-tertiary)}
.ob-number{font-size:11px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.ob-status{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px}
.s-pending{background:var(--color-background-warning);color:var(--color-text-warning)}
.s-paid{background:var(--color-background-success);color:var(--color-text-success)}
.s-shipping{background:var(--color-background-info);color:var(--color-text-info)}
.ob-body{display:flex;align-items:center;gap:10px;padding:10px 12px}
.ob-img{width:44px;height:44px;border-radius:8px;background:var(--color-background-tertiary);display:flex;align-items:center;justify-content:center;border:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.ob-prod-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.ob-prod-sub{font-size:11px;color:var(--color-text-tertiary)}
.ob-price{font-size:14px;font-weight:500;color:#E8242C;margin-left:auto;white-space:nowrap}

/* ── Messages ── */
.msgs{padding:14px;background:var(--color-background-primary)}
.date-sep{text-align:center;margin:10px 0;position:relative}
.date-sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:var(--color-border-tertiary)}
.date-sep span{background:var(--color-background-primary);padding:0 10px;font-size:10px;color:var(--color-text-tertiary);position:relative;z-index:1}

.msg{display:flex;gap:8px;margin-bottom:14px;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.bbl{max-width:68%;padding:9px 12px;font-size:13px;line-height:1.55;word-break:break-word}
.bbl.them{background:var(--color-background-secondary);color:var(--color-text-primary);border-radius:4px 14px 14px 14px}
.bbl.me{background:#E8242C;color:#fff;border-radius:14px 4px 14px 14px}
.msg-meta{font-size:10px;margin-top:3px;color:var(--color-text-tertiary)}
.msg.me .msg-meta{text-align:right}

/* System message */
.sys-msg{text-align:center;margin:10px 0}
.sys-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:5px 12px;border-radius:99px;border:0.5px solid var(--color-border-tertiary)}

/* Image bubble */
.img-bbl{width:200px;border-radius:12px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);cursor:pointer}
.img-inner{width:100%;height:130px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center}

/* Quick action chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;background:var(--color-background-primary)}
.chip{padding:6px 12px;border-radius:99px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);white-space:nowrap;transition:all .12s}
.chip:hover{border-color:#E8242C;color:#E8242C;background:rgba(232,36,44,0.06)}

/* Review prompt */
.review-card{margin:0 14px 10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px}
.rc-title{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.stars{display:flex;gap:4px;margin-bottom:10px}
.star{width:28px;height:28px;cursor:pointer;color:var(--color-border-secondary);transition:color .1s}
.star.lit{color:#FFD700}
.rc-input{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;font-family:var(--font-sans);outline:none;margin-bottom:8px}
.rc-submit{width:100%;padding:8px;border-radius:var(--border-radius-md);border:none;background:#E8242C;color:#fff;font-size:12px;font-weight:500;cursor:pointer}

/* ── Input ── */
.input-area{padding:10px 14px 14px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;flex-direction:column;gap:8px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);flex-shrink:0;transition:all .12s}
.attach-btn:hover{border-color:#E8242C;color:#E8242C}
.inp-wrap{flex:1;display:flex;align-items:center;gap:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:7px 14px;transition:border-color .15s}
.inp-wrap:focus-within{border-color:#E8242C;box-shadow:0 0 0 3px rgba(232,36,44,0.08)}
.inp-wrap input{flex:1;border:none;background:none;outline:none;font-size:13px;color:var(--color-text-primary);font-family:var(--font-sans)}
.send-btn{width:34px;height:34px;border-radius:50%;background:#E8242C;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.send-btn:hover{background:#C41E25}
.send-btn:disabled{background:var(--color-border-secondary);cursor:not-allowed}
</style>

<div class="wrap">

<!-- Top nav -->
<div class="top-nav">
  <button class="back-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
  </button>

  <div class="store-av" style="background:#FCEBEB;color:#A32D2D">СФ</div>

  <div class="store-info">
    <div class="store-name">
      Sarana Fashion
      <div class="verified">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><path d="M2 5l2.5 2.5L8 2.5"/></svg>
      </div>
    </div>
    <div class="online-dot"><div class="odot"></div>Одоо онлайн · Дунджаар 5 мин-д хариудаг</div>
  </div>

  <div class="nav-actions">
    <button class="nav-btn" title="Дэлгүүр харах">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M5 3V2a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>
    </button>
    <button class="nav-btn" title="Гомдол гаргах">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v4M8 10.5v.5"/></svg>
    </button>
    <button class="nav-btn" title="Блоклох">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="3" r="1"/><circle cx="8" cy="8" r="1"/><circle cx="8" cy="13" r="1"/></svg>
    </button>
  </div>
</div>

<!-- Order context banner -->
<div class="order-banner">
  <div class="ob-header">
    <span class="ob-label">Холбоотой захиалга</span>
    <span class="ob-number">#ORD-2604-1042</span>
    <span class="ob-status s-shipping">Хүргэлтэнд</span>
  </div>
  <div class="ob-body">
    <div class="ob-img">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.5" stroke-linecap="round"><path d="M6 2h12l2 5H4L6 2z"/><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M12 11v6M9 14h6"/></svg>
    </div>
    <div>
      <div class="ob-prod-name">Sporty гутал Air — Цагаан, 42</div>
      <div class="ob-prod-sub">1 ширхэг · QPay төлсөн</div>
    </div>
    <div class="ob-price">69,000₮</div>
  </div>
</div>

<!-- Messages -->
<div class="msgs" id="msgs">
  <div class="date-sep"><span>Өнөөдөр</span></div>
</div>

<!-- Review prompt card (хүргэгдсэний дараа харуулна) -->
<div class="review-card" id="review-card" style="display:none">
  <div class="rc-title">Та бараагаа хүлээн авсан уу? Үнэлгээ үлдээнэ үү</div>
  <div class="stars" id="stars"></div>
  <input class="rc-input" id="review-text" placeholder="Сэтгэгдэл бичих (сонголтоор)..." />
  <button class="rc-submit" onclick="submitReview()">Үнэлгээ илгээх →</button>
</div>

<!-- Quick reply chips -->
<div class="chips" id="chips"></div>

<!-- Input area -->
<div class="input-area">
  <div class="input-row">
    <button class="attach-btn" title="Зураг илгээх">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="5.5" cy="6.5" r="1"/><path d="M1 11l4-4 2.5 2.5L11 6l4 4"/></svg>
    </button>
    <div class="inp-wrap">
      <input id="msg-input" placeholder="Мессеж бичих..." onkeydown="handleKey(event)" oninput="toggleSend()" />
      <button class="nav-btn" style="width:24px;height:24px;flex-shrink:0" title="Emoji">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M5.5 9.5s.8 1.5 2.5 1.5 2.5-1.5 2.5-1.5M6.5 6.5v.5M9.5 6.5v.5"/></svg>
      </button>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8H2M14 8L9 3M14 8l-5 5"/></svg>
    </button>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:4px">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.5"><rect x="2" y="5" width="12" height="8" rx="1"/><path d="M5 5V4a3 3 0 016 0v1"/></svg>
    <span style="font-size:10px;color:var(--color-text-tertiary)">Бүх мессеж шифрлэгдсэн</span>
  </div>
</div>

</div>

<script>
const CONVS = [
  {me:false, text:'Сайн байна уу! Захиалга хийсэнд баярлалаа. Таны Sporty Air 42 дугаар бэлэн болсон байна. Өнөөдөр 14:00-18:00 хоорондоо хүргэнэ.', time:'10:12', type:'text'},
  {me:true,  text:'За ойлголоо, баярлалаа! Гэрийн хаяг руу ирэх боломжтой юу?', time:'10:14', type:'text'},
  {me:false, text:'Мэдээж! Жолооч залгаад байршил тодруулна. Утасны дугаар: 9911-2233 — зөв үү?', time:'10:15', type:'text'},
  {me:true,  text:'Тийм зөв. Нэмэлтээр — хэрэв 44 дугаар байвал мэдэгдээрэй, найздаа бас авмаар байна.', time:'10:16', type:'text'},
  {me:false, text:'44 дугаар одоогоор хүлээлтийн жагсаалтад байна. Ирэхэд мэдэгдье! Та имэйлээ үлдээнэ үү.', time:'10:18', type:'text'},
  {me:true,  text:'', time:'10:19', type:'image'},
  {me:false, text:'Зураг хүлээн авлаа. Тэр загвар 42 болон 44 хоёуланд нь байгаа. Захиалга нэмэх үү?', time:'10:21', type:'text'},
  {me:false, text:'', time:'10:22', type:'system', sys:'Жолооч таны хаяг руу гарлаа — 30 мин-д ирнэ'},
  {me:true,  text:'Болоод байна, баярлалаа!', time:'10:35', type:'text'},
  {me:false, text:'', time:'10:55', type:'system', sys:'Захиалга хүргэгдлээ ✓'},
]

const CHIPS_DATA = [
  '44 дугаар байна уу?',
  'Хэзээ хүргэх вэ?',
  'Буцаах боломжтой юу?',
  'Баярлалаа!',
]

let starRating = 0

function buildMsgs(){
  const el = document.getElementById('msgs')
  const sep = el.querySelector('.date-sep')
  el.innerHTML = ''
  el.appendChild(sep)

  CONVS.forEach(m => {
    if(m.type === 'system'){
      const d = document.createElement('div')
      d.className = 'sys-msg'
      d.innerHTML = `<span class="sys-pill">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M5.5 8.5l2 2 3-3.5"/></svg>
        ${m.sys}
      </span>`
      el.appendChild(d)
      return
    }

    const row = document.createElement('div')
    row.className = 'msg' + (m.me ? ' me' : '')

    if(m.type === 'image'){
      if(m.me){
        row.innerHTML = `
          <div>
            <div class="img-bbl">
              <div class="img-inner">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              </div>
            </div>
            <div class="msg-meta">${m.time} · Хүргэгдсэн ✓✓</div>
          </div>
          <div class="msg-av" style="background:rgba(232,36,44,0.1);color:#E8242C">Та</div>`
      }
      el.appendChild(row)
      return
    }

    if(m.me){
      row.innerHTML = `
        <div>
          <div class="bbl me">${m.text}</div>
          <div class="msg-meta">${m.time} · Уншсан ✓✓</div>
        </div>
        <div class="msg-av" style="background:rgba(232,36,44,0.1);color:#E8242C">Та</div>`
    } else {
      row.innerHTML = `
        <div class="msg-av" style="background:#FCEBEB;color:#A32D2D">СФ</div>
        <div>
          <div class="bbl them">${m.text}</div>
          <div class="msg-meta">${m.time}</div>
        </div>`
    }
    el.appendChild(row)
  })

  el.scrollTop = el.scrollHeight
}

function buildChips(){
  const el = document.getElementById('chips')
  el.innerHTML = CHIPS_DATA.map(c =>
    `<button class="chip" onclick="insertChip('${c}')">${c}</button>`
  ).join('')
}

function buildStars(){
  const el = document.getElementById('stars')
  el.innerHTML = [1,2,3,4,5].map(i =>
    `<div class="star${i<=starRating?' lit':''}" onclick="setRating(${i})" id="s${i}">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="${i<=starRating?'#FFD700':'none'}" stroke="${i<=starRating?'#FFD700':'var(--color-border-secondary)'}" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>`
  ).join('')
}

function setRating(n){
  starRating = n
  buildStars()
}

function submitReview(){
  const text = document.getElementById('review-text').value
  const rc = document.getElementById('review-card')
  rc.innerHTML = `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-success)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M5.5 8.5l2 2 3-3.5"/></svg>
    Үнэлгээ хүлээн авлаа. Баярлалаа!
  </div>`
}

function insertChip(text){
  const inp = document.getElementById('msg-input')
  inp.value = text
  inp.focus()
  toggleSend()
}

function toggleSend(){
  const inp = document.getElementById('msg-input')
  const btn = document.getElementById('send-btn')
  btn.disabled = !inp.value.trim()
}

function handleKey(e){
  if(e.key === 'Enter') sendMsg()
}

function sendMsg(){
  const inp  = document.getElementById('msg-input')
  const text = inp.value.trim()
  if(!text) return

  CONVS.push({
    me:true, text, time: new Date().toLocaleTimeString('mn',{hour:'2-digit',minute:'2-digit'}), type:'text'
  })
  buildMsgs()
  inp.value = ''
  toggleSend()

  // Show review after certain messages
  if(CONVS.filter(m=>m.me&&m.type==='text').length >= 3){
    document.getElementById('review-card').style.display = 'block'
    buildStars()
  }
}

buildMsgs()
buildChips()
</script>
